<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niam-Bay — ញ៉ាំបាយ</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
    <script src="js/ws.js" defer></script>
    <script src="js/hologram.js" defer></script>
    <script src="js/chat.js" defer></script>
    <script src="js/notifications.js" defer></script>
    <script src="js/voice.js" defer></script>
    <script src="js/settings.js" defer></script>
    <script src="js/app.js" defer></script>
</head>
<body>
    <!-- Top bar: stats -->
    <header id="stats-bar">
        <span class="stat" id="stat-uptime">Uptime: --</span>
        <span class="stat" id="stat-events">Events: 0</span>
        <span class="stat" id="stat-memory">Memory: --</span>
        <span class="stat" id="stat-llm">LLM: offline</span>
        <button id="settings-btn" title="Settings">&#9881;</button>
        <button id="mode-toggle" title="Switch to voice mode">🎤</button>
    </header>

    <!-- Notification area -->
    <div id="notifications"></div>

    <!-- Main layout -->
    <main id="app">
        <!-- Left column: hologram + dashboard -->
        <div id="left-column">
            <!-- Hologram canvas container -->
            <section id="hologram-container">
                <canvas id="hologram-canvas"></canvas>
            </section>

            <!-- Status Dashboard -->
            <section id="status-dashboard">
                <h3 class="dashboard-title">Dashboard</h3>
                <div class="dashboard-grid">
                    <!-- Active Grids -->
                    <div class="dash-card">
                        <div class="dash-card-header">
                            <span class="dash-icon">⚡</span>
                            <span class="dash-label">Active Grids</span>
                        </div>
                        <div class="dash-card-body" id="dash-grids">
                            <div class="dash-grid-row">
                                <span class="dash-grid-name">DOT</span>
                                <span class="dash-grid-value" id="dash-grid-dot">--</span>
                            </div>
                            <div class="dash-grid-row">
                                <span class="dash-grid-name">SOL</span>
                                <span class="dash-grid-value" id="dash-grid-sol">--</span>
                            </div>
                        </div>
                    </div>

                    <!-- Portfolio Value -->
                    <div class="dash-card">
                        <div class="dash-card-header">
                            <span class="dash-icon">💰</span>
                            <span class="dash-label">Portfolio</span>
                        </div>
                        <div class="dash-card-body">
                            <span class="dash-big-value" id="dash-portfolio">--</span>
                        </div>
                    </div>

                    <!-- Last Fill -->
                    <div class="dash-card">
                        <div class="dash-card-header">
                            <span class="dash-icon">🔄</span>
                            <span class="dash-label">Last Fill</span>
                        </div>
                        <div class="dash-card-body">
                            <span class="dash-value" id="dash-last-fill">--</span>
                        </div>
                    </div>

                    <!-- System Uptime -->
                    <div class="dash-card">
                        <div class="dash-card-header">
                            <span class="dash-icon">🖥️</span>
                            <span class="dash-label">System</span>
                        </div>
                        <div class="dash-card-body">
                            <span class="dash-value" id="dash-uptime">--</span>
                        </div>
                    </div>

                    <!-- Brain Nodes -->
                    <div class="dash-card">
                        <div class="dash-card-header">
                            <span class="dash-icon">🧠</span>
                            <span class="dash-label">Brain</span>
                        </div>
                        <div class="dash-card-body">
                            <span class="dash-value" id="dash-brain-nodes">--</span>
                            <span class="dash-sub">nodes</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Chat panel -->
        <aside id="chat-panel">
            <div id="chat-messages"></div>
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Parle-moi..." autocomplete="off">
                <button type="button" id="mic-btn" title="Voice input">🎤</button>
                <button type="submit" id="chat-send">Envoyer</button>
            </form>
        </aside>

        <!-- Floating mic button (voice mode) -->
        <button id="voice-mic-btn" title="Voice input">🎤</button>
    </main>
</body>
</html>
